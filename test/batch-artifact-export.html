          ],
          row("ZIP-001", 0),
          row("ZIP-002", 1),
          row("ZIP-003", 2)
        ];

        const conversion = window.EDutiXlsxConverter._test.convertXlsxRows(rows, "43");
        const files = conversion.submissions.map(function (submission, index) {
          submission.attachments.push({
            name: "attachment-" + (index + 1) + ".pdf",
            base64: "QUJD",
            size: 3,
            type: "application/pdf"
          });
          window.EDutiXlsxConverter.validateSubmission(submission);
          if (submission.status !== "valid") {
            throw new Error("Submission " + (index + 1) + " is not valid: " + submission.errors.join("; "));
          }
          return {
            name: "eduti_" + submission.rowNumber + "_" + submission.refNo + ".xml",
            base64: btoa(unescape(encodeURIComponent(window.EDutiXlsxConverter.generateSubmissionXml(submission))))
          };
        });

        document.getElementById("results").textContent = JSON.stringify({
          ok: true,
          files: files
        });
      } catch (error) {
        document.getElementById("results").textContent = JSON.stringify({
          ok: false,
          error: error.stack || error.message || String(error)
        });
      }
    });
